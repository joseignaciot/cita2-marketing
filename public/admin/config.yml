backend:
  name: git-gateway
  branch: main

# Netlify Identity
local_backend: false

# Idioma del panel
locale: es

# Carpeta de media
media_folder: "public/images/blog"
public_folder: "/images/blog"

collections:
  # ─── BLOG POSTS ───────────────────────────────────────────────
  - name: "posts"
    label: "📝 Blog Posts"
    folder: "src/content/posts"
    create: true
    delete: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "Título", name: "title", widget: "string" }
      - { label: "Descripción (SEO)", name: "description", widget: "text" }
      - { label: "Fecha de publicación", name: "pubDate", widget: "datetime", format: "YYYY-MM-DD", date_format: "DD/MM/YYYY", time_format: false }
      - { label: "Autor", name: "author", widget: "string", default: "Agenda de Reservas Team" }
      - label: "Categoría"
        name: "category"
        widget: "select"
        options:
          - { label: "Marketing", value: "marketing" }
          - { label: "Sectores", value: "sectores" }
          - { label: "Guías", value: "guias" }
          - { label: "Comparativas", value: "comparativas" }
      - { label: "Tags", name: "tags", widget: "list", default: [] }
      - { label: "Destacado", name: "featured", widget: "boolean", default: false }
      - { label: "Tiempo de lectura (min)", name: "readingTime", widget: "number", default: 5, value_type: "int" }
      - { label: "Imagen de portada", name: "image", widget: "image", required: false }
      - { label: "Contenido", name: "body", widget: "markdown" }

  # ─── TESTIMONIALS ─────────────────────────────────────────────
  - name: "testimonials"
    label: "⭐ Testimonios"
    folder: "src/content/testimonials"
    create: true
    delete: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "Nombre", name: "name", widget: "string" }
      - { label: "Empresa", name: "business", widget: "string" }
      - { label: "Cargo", name: "role", widget: "string" }
      - { label: "Sector", name: "sector", widget: "string" }
      - { label: "Ciudad", name: "location", widget: "string" }
      - { label: "Testimonio", name: "quote", widget: "text" }
      - { label: "Resultado 1 (valor)", name: "stat1Value", widget: "string", required: false }
      - { label: "Resultado 1 (etiqueta)", name: "stat1Label", widget: "string", required: false }
      - { label: "Resultado 2 (valor)", name: "stat2Value", widget: "string", required: false }
      - { label: "Resultado 2 (etiqueta)", name: "stat2Label", widget: "string", required: false }

  # ─── FAQs ─────────────────────────────────────────────────────
  - name: "faqs"
    label: "❓ Preguntas Frecuentes"
    folder: "src/content/faqs"
    create: true
    delete: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "Pregunta", name: "question", widget: "string" }
      - { label: "Respuesta", name: "answer", widget: "text" }
      - label: "Categoría"
        name: "category"
        widget: "select"
        options:
          - { label: "General", value: "general" }
          - { label: "Precios", value: "precios" }
          - { label: "Funcionalidades", value: "funcionalidades" }
          - { label: "Soporte", value: "soporte" }
      - { label: "Orden", name: "order", widget: "number", default: 0, value_type: "int" }

backend:
  name: git-gateway
  branch: main

locale: es

media_folder: "public/images/blog"
public_folder: "/images/blog"

collections:

  # ─── BLOG POSTS ───────────────────────────────────────────────
  - name: "posts"
    label: "📝 Blog Posts"
    folder: "src/content/posts"
    create: true
    delete: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "Título", name: "title", widget: "string" }
      - { label: "Descripción (SEO)", name: "description", widget: "text" }
      - { label: "Fecha de publicación", name: "pubDate", widget: "datetime", format: "YYYY-MM-DD", date_format: "DD/MM/YYYY", time_format: false }
      - { label: "Autor", name: "author", widget: "string", default: "Agenda de Reservas Team" }
      - label: "Categoría"
        name: "category"
        widget: "select"
        options:
          - { label: "Marketing", value: "marketing" }
          - { label: "Sectores", value: "sectores" }
          - { label: "Guías", value: "guias" }
          - { label: "Comparativas", value: "comparativas" }
      - { label: "Tags", name: "tags", widget: "list", default: [] }
      - { label: "Destacado", name: "featured", widget: "boolean", default: false }
      - { label: "Tiempo de lectura (min)", name: "readingTime", widget: "number", default: 5, value_type: "int" }
      - { label: "Imagen de portada", name: "image", widget: "image", required: false }
      - { label: "Contenido", name: "body", widget: "markdown" }

  # ─── TESTIMONIOS ──────────────────────────────────────────────
  - name: "testimonials"
    label: "⭐ Testimonios"
    folder: "src/content/testimonials"
    create: true
    delete: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "Nombre", name: "name", widget: "string" }
      - { label: "Empresa", name: "business", widget: "string" }
      - { label: "Cargo", name: "role", widget: "string" }
      - label: "Sector"
        name: "sector"
        widget: "select"
        options:
          - { label: "Peluquería", value: "peluquerias" }
          - { label: "Restaurante", value: "restaurantes" }
          - { label: "Turismo", value: "turismo" }
          - { label: "Estética", value: "estetica" }
          - { label: "Fisioterapia", value: "fisioterapia" }
          - { label: "Psicología", value: "psicologia" }
          - { label: "Veterinaria", value: "veterinarias" }
          - { label: "General", value: "general" }
      - { label: "Ciudad", name: "location", widget: "string" }
      - { label: "Testimonio", name: "quote", widget: "text" }
      - { label: "Valoración (1-5)", name: "rating", widget: "number", default: 5, value_type: "int" }
      - { label: "Resultado 1 (valor)", name: "stat1Value", widget: "string", required: false }
      - { label: "Resultado 1 (etiqueta)", name: "stat1Label", widget: "string", required: false }
      - { label: "Resultado 2 (valor)", name: "stat2Value", widget: "string", required: false }
      - { label: "Resultado 2 (etiqueta)", name: "stat2Label", widget: "string", required: false }

  # ─── FAQs ─────────────────────────────────────────────────────
  - name: "faqs"
    label: "❓ Preguntas Frecuentes"
    folder: "src/content/faqs"
    create: true
    delete: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "Pregunta", name: "question", widget: "string" }
      - { label: "Respuesta", name: "answer", widget: "text" }
      - label: "Categoría / Sector"
        name: "category"
        widget: "select"
        options:
          - { label: "General", value: "general" }
          - { label: "Precios", value: "precios" }
          - { label: "Peluquerías", value: "peluquerias" }
          - { label: "Restaurantes", value: "restaurantes" }
          - { label: "Turismo", value: "turismo" }
          - { label: "Psicología", value: "psicologia" }
          - { label: "Veterinarias", value: "veterinarias" }
      - { label: "Orden", name: "order", widget: "number", default: 0, value_type: "int" }

  # ─── PÁGINAS DE SECTOR ────────────────────────────────────────
  - name: "sector-pages"
    label: "📄 Páginas de Sector"
    files:

      - name: "peluquerias"
        label: "✂️ Peluquerías"
        file: "src/content/sectors/peluquerias.json"
        fields:
          - { label: "Meta título (SEO)", name: "pageTitle", widget: "string" }
          - { label: "Meta descripción (SEO)", name: "pageDescription", widget: "text" }
          - label: "Descripción para IA (ChatGPT, Perplexity)"
            name: "aiDescription"
            widget: "text"
            hint: "Texto corto y factual (máx. 200 caracteres) para ser citado por buscadores de IA. Sin adjetivos, solo datos: qué hace, precio, diferencia principal."
            required: false
          - { label: "Hero — Título principal", name: "heroTitle", widget: "string" }
          - { label: "Hero — Subtítulo", name: "heroSubtitle", widget: "text" }
          - label: "Funcionalidades"
            name: "features"
            widget: "list"
            fields:
              - { label: "Título", name: "title", widget: "string" }
              - { label: "Descripción", name: "description", widget: "text" }
              - { label: "Icono", name: "icon", widget: "select", options: ["calendar","bell","message","users","chart","zap","credit","smartphone"] }
          - label: "Testimonios"
            name: "testimonials"
            widget: "list"
            fields:
              - { label: "Cita", name: "quote", widget: "text" }
              - { label: "Nombre", name: "author", widget: "string" }
              - { label: "Cargo", name: "role", widget: "string" }
              - { label: "Empresa y ciudad", name: "company", widget: "string" }
          - label: "Preguntas frecuentes"
            name: "faqs"
            widget: "list"
            fields:
              - { label: "Pregunta", name: "question", widget: "string" }
              - { label: "Respuesta", name: "answer", widget: "text" }

